{% load static %}
{% load custom_tags %}  <!-- Load your custom tags here -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Officer Dashboard for Motorcycle Violations">
    <title>{% block title %}Officer Dashboard{% endblock %}</title>
    <link rel="icon" type="image/png" href="{% static 'motorcycle_violation/icons/icon-96.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.1/dist/lux/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'motorcycle_violation/css/styles.css' %}"> <!-- Link to the external CSS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'officer_dashboard' %}">
                <img src="{% static 'motorcycle_violation/images/logo.jpg' %}" 
            alt="Logo" 
            class="me-2" 
            style="height: 60px; width: 60px; object-fit: cover; border-radius: 50%;">
        <span class="fw-bold">Safe Ride</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'officer_dashboard' %}">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'officer_profile' %}">Profile</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'logout' %}">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %} <!-- Placeholder for custom scripts -->
</body>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Find all success and info alerts inside the container
        const alerts = document.querySelectorAll('.alert-success');
        alerts.forEach(alert => {
            setTimeout(() => {
                alert.style.display = 'none';  // Hide the alert after 3 seconds
            }, 3000); // 3000 milliseconds = 3 seconds
        });
    });
</script>


</html>
